<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PATHWAY · U-13 · MAS-MSQ-U13</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0C2340;--gold:#B8902A;--gold-l:#FFF8E6;--gold-d:#8a6a1a;
  --teal:#1D9E75;--teal-l:#E1F5EE;--coral:#D85A30;--coral-l:#FAECE7;
  --purple:#5C3A8A;--purple-l:#F0EAF8;
  --bg:#f7f7f5;--surface:#ffffff;--border:#e0ddd6;--text:#1a1a18;--muted:#6b6b67;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:780px;margin:0 auto;padding:24px 16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}

/* HEADER */
.hdr{background:var(--navy);padding:18px 24px;display:flex;align-items:center;gap:14px}
.logo{width:38px;height:38px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;letter-spacing:.5px;flex-shrink:0}
.hdr-main{flex:1}
.hdr-t{font-size:15px;font-weight:600;color:#fff}
.hdr-s{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.age-pill{background:var(--gold);color:#fff;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;white-space:nowrap;flex-shrink:0}

/* NAV TABS */
.nav-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.tab{flex:1;padding:13px 8px;text-align:center;cursor:pointer;font-size:13px;color:var(--muted);border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:600}
.tab-count{display:inline-block;background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:5px}

/* MODULE SWITCHER */
.module-bar{display:flex;gap:8px;padding:14px 20px;border-bottom:1px solid var(--border);background:#fafaf8;flex-wrap:wrap}
.mod-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .15s}
.mod-btn:hover{border-color:var(--navy);color:var(--navy)}
.mod-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.mod-btn.ath-active{background:var(--teal);color:#fff;border-color:var(--teal)}
.mod-label{font-size:11px;color:var(--muted);align-self:center}

/* ATHLETE LIST */
.list-toolbar{padding:14px 20px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border)}
.list-toolbar input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg)}
.btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;color:var(--text);white-space:nowrap;transition:all .12s}
.btn:hover{border-color:var(--navy);color:var(--navy)}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.primary:hover{background:#1a3a5c}
.btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn.gold:hover{background:var(--gold-d)}
.btn.teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn.sm{padding:5px 12px;font-size:12px}
.btn.danger{color:#A32D2D;border-color:#F09595}
.btn.danger:hover{background:#FCEBEB}

.athlete-table{width:100%;border-collapse:collapse}
.athlete-table th{font-size:11px;color:var(--muted);font-weight:600;text-align:left;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg);letter-spacing:.4px;text-transform:uppercase}
.athlete-table td{padding:11px 20px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.athlete-table tr:last-child td{border-bottom:none}
.athlete-table tr:hover td{background:#fafaf8}
.status-pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px}
.status-pill.complete{background:var(--teal-l);color:#0F6E56}
.status-pill.partial{background:var(--gold-l);color:#854F0B}
.status-pill.empty{background:#f0f0ee;color:var(--muted)}
.actions-cell{display:flex;gap:6px;flex-wrap:wrap}
.empty-state{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:.4}

/* INTAKE FORM */
.form-body{padding:22px 24px}
.form-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.form-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.field label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.field input,.field select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);outline:none;transition:border-color .12s}
.field input:focus,.field select:focus{border-color:var(--navy)}
.field.full{grid-column:1/-1}
.form-actions{display:flex;gap:10px;padding-top:4px;flex-wrap:wrap}
.module-toggle{display:flex;gap:8px;align-items:center;padding:12px 0 0}
.module-toggle label{font-size:12px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px}
.module-toggle input[type=checkbox]{width:16px;height:16px;accent-color:var(--teal)}

/* QUESTIONNAIRE */
.prog-bar{padding:14px 24px 12px;background:#fafaf8;border-bottom:1px solid var(--border)}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-label{font-size:12px;color:var(--muted)}
.prog-pct{font-size:12px;font-weight:600;color:var(--navy)}
.prog-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.prog-fill.msq{background:var(--gold)}
.prog-fill.ath{background:var(--teal)}
.dim-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.dim-tag.B{background:var(--gold-l);color:#854F0B;border:1px solid var(--gold)}
.dim-tag.C{background:var(--teal-l);color:#0F6E56;border:1px solid #9FE1CB}
.dim-tag.E{background:#FEF5E6;color:#7a5010;border:1px solid #D4A843}
.dim-tag.A{background:var(--teal-l);color:#0F6E56;border:1px solid #9FE1CB}
.dim-tag.ATH-B{background:var(--gold-l);color:#854F0B;border:1px solid var(--gold)}
.dim-tag.ATH-C{background:#FEF5E6;color:#7a5010;border:1px solid #D4A843}

.q-body{padding:26px 24px 18px}
.q-num{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.q-text{font-size:16px;line-height:1.7;color:var(--text);margin-bottom:28px;min-height:56px}
.module-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 10px;border-radius:10px;margin-bottom:12px}
.module-badge.msq{background:var(--navy);color:#fff}
.module-badge.ath{background:var(--teal);color:#fff}

/* 3-LEVEL SCALE */
.scale-3{display:flex;gap:12px;margin-top:4px}
.lb3{flex:1;border:1.5px solid var(--border);border-radius:12px;background:var(--bg);cursor:pointer;padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .15s;min-width:0}
.lb3:hover{border-color:var(--gold);background:var(--gold-l);transform:translateY(-1px)}
.lb3.sel{border-width:2.5px;transform:translateY(-2px)}
.lb3.sel-0{background:#f0f0ee;border-color:#999;}.lb3.sel-0 .lb3-icon{color:#666}
.lb3.sel-1{background:var(--gold-l);border-color:var(--gold);}.lb3.sel-1 .lb3-icon{color:var(--gold-d)}
.lb3.sel-2{background:var(--teal-l);border-color:var(--teal);}.lb3.sel-2 .lb3-icon{color:var(--teal)}
.lb3-icon{font-size:28px;line-height:1}
.lb3-label{font-size:12px;font-weight:700;color:var(--text);text-align:center;line-height:1.3}
.lb3-sub{font-size:10px;color:var(--muted);text-align:center;line-height:1.3}

.q-nav{padding:14px 24px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--border);background:var(--surface)}
.nav-hint{font-size:12px;margin-left:4px}
.nav-hint.ok{color:var(--teal)}
.nav-hint.req{color:var(--coral)}
.spacer{flex:1}

/* REPORT */
.report-body{padding:28px 28px}
@media print{
  body{background:#fff}
  .app{padding:0;max-width:100%}
  .no-print{display:none!important}
  .card{border:none;box-shadow:none;margin:0;border-radius:0}
  .report-body{padding:20px 24px}
  .dim-card{page-break-inside:avoid}
  .rec-block{page-break-inside:avoid}
  .module-section{page-break-before:always}
}
.rep-hdr{border-bottom:2.5px solid var(--navy);padding-bottom:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-end;gap:16px}
.rep-logo-row{display:flex;align-items:center;gap:12px}
.rep-logo{width:36px;height:36px;background:var(--navy);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.rep-org-name{font-size:14px;font-weight:700;color:var(--navy)}
.rep-org-sub{font-size:10px;color:var(--muted);margin-top:1px}
.rep-meta{text-align:right;font-size:11px;color:var(--muted);line-height:1.7}
.rep-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.rep-subtitle{font-size:12px;color:var(--muted);margin-bottom:20px}
.athlete-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.ag-cell{background:var(--bg);border-radius:8px;padding:10px 13px;border:1px solid var(--border)}
.ag-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.3px;text-transform:uppercase;margin-bottom:3px}
.ag-val{font-size:13px;font-weight:600;color:var(--text)}
.section-label{font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;font-weight:700;margin:20px 0 12px}
.module-section-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:8px;margin:20px 0 12px}
.module-section-hdr.msq{background:var(--navy)}
.module-section-hdr.ath{background:var(--teal)}
.module-section-hdr span{font-size:13px;font-weight:700;color:#fff}
.module-section-hdr small{font-size:11px;color:rgba(255,255,255,.6);margin-left:auto}

.dim-card{border:1px solid var(--border);border-radius:10px;padding:15px 18px;margin-bottom:10px}
.dc-row1{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;gap:8px;flex-wrap:wrap}
.dc-name{font-size:13px;font-weight:700;color:var(--text)}
.dc-badge{font-size:11px;font-weight:700;padding:3px 11px;border-radius:20px}
.dc-badge.h{background:var(--teal-l);color:#0F6E56;border:1px solid #5DCAA5}
.dc-badge.m{background:var(--gold-l);color:#854F0B;border:1px solid var(--gold)}
.dc-badge.l{background:var(--coral-l);color:#993C1D;border:1px solid #F0997B}
.bar-labels-row{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-bottom:4px}
.bar-track{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:6px;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:4px}
.bar-fill.h{background:var(--teal)}.bar-fill.m{background:var(--gold)}.bar-fill.l{background:var(--coral)}
.dc-count{font-size:10px;color:var(--muted);margin-bottom:8px}
.dc-interp{font-size:12px;color:var(--text);line-height:1.65;padding:9px 12px;background:var(--bg);border-radius:7px;border-left:3px solid var(--border)}
.dc-interp.h{border-left-color:var(--teal)}.dc-interp.m{border-left-color:var(--gold)}.dc-interp.l{border-left-color:var(--coral)}
.rec-block{margin-top:20px;padding:16px 18px;border:1px solid var(--border);border-radius:10px;background:var(--bg)}
.rec-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px}
.rec-text{font-size:12px;color:var(--muted);line-height:1.75}
.disclaimer{margin-top:16px;padding:11px 14px;font-size:10px;color:var(--muted);background:var(--bg);border-radius:8px;line-height:1.7;border:1px solid var(--border)}
.rep-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.score-block{border-radius:10px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:16px}
.score-block.msq{background:var(--navy)}
.score-block.ath{background:var(--teal)}
.gc-score-label{font-size:11px;color:rgba(255,255,255,.6);margin-bottom:3px}
.gc-score-val{font-size:34px;font-weight:700;color:#fff;line-height:1}
.gc-score-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px}
.gc-interp{text-align:right;max-width:240px}
.gc-interp-text{font-size:12px;color:var(--gold);line-height:1.6;font-weight:600}
.score-block.ath .gc-interp-text{color:#fff}
.gc-band{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="card">
  <div class="hdr">
    <div class="logo">MAS</div>
    <div class="hdr-main">
      <div class="hdr-t">PATHWAY · Psychological Assessment</div>
      <div class="hdr-s">MAS Foundation · Qatar Foundation Ecosystem · Female Athlete Talent Detection</div>
    </div>
    <div class="age-pill">U-13 · MSQ18</div>
  </div>
  <div class="nav-tabs">
    <button class="tab active" onclick="showTab('list')" id="tab-list">Athlete list <span class="tab-count" id="count-badge">0</span></button>
    <button class="tab" onclick="showTab('intake')" id="tab-intake">New assessment</button>
    <button class="tab" onclick="showTab('questionnaire')" id="tab-q" style="display:none">Questionnaire</button>
    <button class="tab" onclick="showTab('report')" id="tab-report" style="display:none">Report</button>
  </div>
</div>

<!-- ATHLETE LIST -->
<div class="card" id="view-list">
  <div class="list-toolbar">
    <input type="text" id="search-input" placeholder="Search athlete by name or sport…" oninput="renderList()"/>
    <button class="btn gold" onclick="showTab('intake')">+ New athlete</button>
    <button class="btn" onclick="exportAllJSON()">Export all JSON</button>
  </div>
  <div id="athlete-list-body"></div>
</div>

<!-- INTAKE FORM -->
<div class="card" id="view-intake" style="display:none">
  <div class="form-body">
    <div class="form-title">New Athlete Assessment</div>
    <div class="form-sub">Complete athlete profile before starting the questionnaire.</div>
    <div class="form-grid">
      <div class="field"><label>Full name *</label><input type="text" id="f-name" placeholder="Athlete full name"/></div>
      <div class="field"><label>Date of birth</label><input type="date" id="f-dob"/></div>
      <div class="field"><label>Sport *</label>
        <select id="f-sport">
          <option value="">Select discipline…</option>
          <option value="Athletics">Athletics</option>
          <option value="Basketball">Basketball</option>
          <option value="Fencing">Fencing</option>
          <option value="Tennis">Tennis</option>
          <option value="Volleyball">Volleyball</option>
        </select>
      </div>
      <div class="field"><label>Assessment date</label><input type="date" id="f-date"/></div>
      <div class="field"><label>Evaluator name</label><input type="text" id="f-eval" placeholder="Evaluator (Level 2 certified)"/></div>
      <div class="field"><label>Detection Day location</label><input type="text" id="f-location" placeholder="Venue / school name"/></div>
      <div class="field full"><label>Session notes</label><input type="text" id="f-notes" placeholder="Optional — context, observations…"/></div>
    </div>
    <div class="module-toggle">
      <label><input type="checkbox" id="f-ath-module" disabled/> <span id="ath-module-label" style="color:var(--muted)">Add Athletics module (MAS-PSY-ATH-U13) — select Athletics above</span></label>
    </div>
    <div class="form-actions" style="margin-top:18px">
      <button class="btn primary" onclick="startAssessment()">Start assessment · 18 items</button>
      <button class="btn" onclick="showTab('list')">← Cancel</button>
    </div>
  </div>
</div>

<!-- QUESTIONNAIRE -->
<div class="card" id="view-questionnaire" style="display:none">
  <div id="q-content"></div>
</div>

<!-- REPORT -->
<div class="card" id="view-report" style="display:none">
  <div id="report-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const MSQ_DIMS = [
  {id:"B", name:"Emotional Regulation", color:"#B8902A", tagClass:"B", items:[
    "After a mistake, I can quickly focus on what comes next",
    "When I feel angry in training, I find a way to calm down",
    "Before a competition, I'm nervous but I still perform well",
    "When something unfair happens, I stay focused",
    "After losing, I feel sad for a while — then I'm ready to try again",
    "I can stop thinking about a bad session when it's over"
  ]},
  {id:"C", name:"Self-Confidence", color:"#1D9E75", tagClass:"C", items:[
    "I believe I can do well even against stronger athletes",
    "After bad results, I still believe I can improve",
    "I know my strengths and use them when things get hard",
    "When I try something hard, I believe I will eventually do it",
    "I feel I belong in my group, even if others seem better",
    "In key moments, I trust myself to do what I have trained"
  ]},
  {id:"E", name:"Intrinsic Motivation", color:"#B8902A", tagClass:"E", items:[
    "I love my sport even on tired days when training is hard",
    "I enjoy training even when nobody is watching",
    "Learning something new excites me even when I get it wrong at first",
    "I would still do my sport without trophies or praise",
    "When I improve even a small thing, I feel really proud",
    "I think about my sport outside of training"
  ]}
];

const ATH_DIMS = [
  {id:"ATH-A", name:"Motivation for Volume Training", color:"#1D9E75", tagClass:"A", items:[
    "When my coach announces a long session, I feel ready — not tired",
    "Even repetitive drills don't make me want to stop",
    "After a hard session, I feel proud — not just relieved",
    "I push through every repetition — even the last and hardest",
    "I still enjoy training even on very long, tiring days",
    "When my coach increases training load, I accept it and try my best"
  ]},
  {id:"ATH-B", name:"Response to Time / Distance Outcomes", color:"#B8902A", tagClass:"ATH-B", items:[
    "After seeing my time or distance, I think: how can I improve next time?",
    "A disappointing result still motivates me to keep training",
    "I compare my times to my own personal best — not to other athletes",
    "On the start line, I feel focused — not scared of my result",
    "After a personal best, I am already thinking about doing even better",
    "After a bad competition result, I come back to training motivated"
  ]},
  {id:"ATH-C", name:"Effort & Fatigue", color:"#B87020", tagClass:"ATH-C", items:[
    "When my legs feel heavy, I try to keep my pace — not slow down",
    "When I underperform, I first ask myself: did I really give everything?",
    "In the last part of a race, I try to finish as strong as I started",
    "I know the difference: tired from hard work vs. tired from low effort",
    "After giving absolutely everything — even a bad result feels good",
    "How hard I try is my decision — not dependent on how I feel"
  ]}
];

const SCALE3 = [
  {val:0, icon:"😐", label:"Not me", sub:"This does not describe me"},
  {val:1, icon:"🙂", label:"A little me", sub:"This describes me sometimes"},
  {val:2, icon:"⭐", label:"That's me", sub:"This describes me well"}
];

const STORAGE_KEY = "pathway_u13_msq18";

// Build flat item lists
let MSQ_ITEMS = [];
MSQ_DIMS.forEach(d => d.items.forEach((q,li) => MSQ_ITEMS.push({dimId:d.id, dimName:d.name, tagClass:d.tagClass, q, li, module:"msq"})));

let ATH_ITEMS = [];
ATH_DIMS.forEach(d => d.items.forEach((q,li) => ATH_ITEMS.push({dimId:d.id, dimName:d.name, tagClass:d.tagClass, q, li, module:"ath"})));

// ─── STATE ───────────────────────────────────────────────────────────────────
let athletes = [];
let curAthleteId = null;
let curItemIdx = 0;
let curModule = "msq"; // "msq" or "ath"

function loadStorage(){ try{const r=localStorage.getItem(STORAGE_KEY);if(r)athletes=JSON.parse(r);}catch(e){athletes=[];} }
function saveStorage(){ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(athletes));}catch(e){toast("Storage error — export JSON now");} }
function getAthlete(id){ return athletes.find(a=>a.id===id); }
function curAthlete(){ return getAthlete(curAthleteId); }

function allItems(a){ return a.hasAthletics ? [...MSQ_ITEMS, ...ATH_ITEMS] : MSQ_ITEMS; }
function totalItems(a){ return a.hasAthletics ? 36 : 18; }

// ─── INTAKE SPORT SELECT ──────────────────────────────────────────────────────
document.getElementById("f-sport").addEventListener("change", function(){
  const isAth = this.value === "Athletics";
  const cb = document.getElementById("f-ath-module");
  const lbl = document.getElementById("ath-module-label");

  else { cb.disabled=true; cb.checked=false; lbl.style.color="var(--muted)"; lbl.textContent="Add Athletics module (MAS-PSY-ATH-U13) — select Athletics above"; }
  const btn = document.querySelector(".btn.primary");

});
document.getElementById("f-ath-module").addEventListener("change", function(){

// ─── TABS ─────────────────────────────────────────────────────────────────────
const VIEWS = ["list","intake","questionnaire","report"];
function showTab(name){
  VIEWS.forEach(v=>{
    document.getElementById("view-"+v).style.display = v===name?"block":"none";
    const t=document.getElementById("tab-"+v);
    if(t) t.classList.toggle("active",v===name);
  });
  if(name==="list") renderList();
  if(name==="questionnaire") renderQ();
  if(name==="report") renderReport();
}

// ─── LIST ─────────────────────────────────────────────────────────────────────
function renderList(){
  const q=(document.getElementById("search-input")?.value||"").toLowerCase();
  const filtered=athletes.filter(a=>a.name.toLowerCase().includes(q)||a.sport.toLowerCase().includes(q));
  document.getElementById("count-badge").textContent=athletes.length;
  const tbody=document.getElementById("athlete-list-body");
  if(!athletes.length){ tbody.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div>No athletes yet.<br>Click <strong>New athlete</strong> to begin.</div>`; return; }
  if(!filtered.length){ tbody.innerHTML=`<div class="empty-state">No athletes match your search.</div>`; return; }
  let html=`<table class="athlete-table"><thead><tr><th>Name</th><th>Sport</th><th>Date</th><th>Progress</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
  filtered.forEach(a=>{
    const total=totalItems(a);
    const ans=Object.keys(a.answers||{}).length;
    const pct=Math.round(ans/total*100);
    const status=ans===total?"complete":ans>0?"partial":"empty";
    const statusLabel=ans===total?"Complete":ans>0?`${pct}% (${ans}/${total})`:"Not started";
    html+=`<tr>
      <td><strong>${a.name}</strong></td>
      <td>${a.sport||"—"}${a.hasAthletics?" <span style='font-size:10px;color:var(--teal);font-weight:600'>+ATH</span>":""}</td>
      <td>${a.date||"—"}</td>
      <td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:4px;background:#e0ddd6;border-radius:2px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${status==="complete"?"#1D9E75":status==="partial"?"#B8902A":"#e0ddd6"};border-radius:2px"></div></div><span style="font-size:11px;color:#6b6b67;white-space:nowrap">${ans}/${total}</span></div></td>
      <td><span class="status-pill ${status}">${statusLabel}</span></td>
      <td><div class="actions-cell">
        <button class="btn sm" onclick="resumeAthlete('${a.id}')">${ans===total?"View":"Continue"}</button>
        <button class="btn sm" onclick="viewReport('${a.id}')">Report</button>
        <button class="btn sm" onclick="exportJSON('${a.id}')">JSON</button>
        <button class="btn sm danger" onclick="deleteAthlete('${a.id}')">Delete</button>
      </div></td>
    </tr>`;
  });
  html+=`</tbody></table>`;
  tbody.innerHTML=html;
}

function resumeAthlete(id){ curAthleteId=id; curItemIdx=findFirstUnanswered(); document.getElementById("tab-q").style.display=""; showTab("questionnaire"); }
function viewReport(id){ curAthleteId=id; document.getElementById("tab-report").style.display=""; showTab("report"); }
function deleteAthlete(id){ const a=getAthlete(id); if(!confirm(`Delete ${a.name}'s data?`))return; athletes=athletes.filter(x=>x.id!==id); saveStorage(); renderList(); toast("Athlete deleted"); }

// ─── INTAKE ───────────────────────────────────────────────────────────────────
function startAssessment(){

// ─── QUESTIONNAIRE ────────────────────────────────────────────────────────────
function findFirstUnanswered(){
  const a=curAthlete();
  const items=allItems(a);
  for(let i=0;i<items.length;i++){ if(a.answers[i]===undefined) return i; }
  return items.length-1;
}

  const total=items.length;
  const item=items[curItemIdx];
  const answered=Object.keys(a.answers).length;

      <span style="font-size:10px;font-weight:700;padding:2px 10px;border-radius:10px;background:${isAthSection?"var(--teal)":"var(--navy)"};color:#fff">${isAthSection?"MAS-PSY-ATH-U13 · Athletics":"MAS-MSQ-U13 · All sports"}</span>
    </div>
  </div>
  <div class="q-body">
    <div class="q-num">Item ${curItemIdx+1} of ${total}${curItemIdx>=18&&a.hasAthletics?" · Athletics module item "+(curItemIdx-17):""}</div>
    <div class="q-text">${item.q}</div>
    <div class="scale-3">
      ${SCALE3.map(s=>`<button class="lb3${cur===s.val?" sel sel-"+s.val:""}" onclick="answer(${s.val})">

function answer(v){ const a=curAthlete(); a.answers[curItemIdx]=v; saveStorage(); renderQ(); }
function goQ(dir){ curItemIdx=Math.max(0,Math.min(allItems(curAthlete()).length-1,curItemIdx+dir)); renderQ(); }
function skipToReport(){ const a=curAthlete(); if(Object.keys(a.answers).length===0){alert("Please answer at least one item first.");return;} if(confirm("Generate report now?\nUnanswered items will be excluded from scores."))finishQ(); }
function finishQ(){ document.getElementById("tab-report").style.display=""; showTab("report"); }

// ─── SCORES ───────────────────────────────────────────────────────────────────
function calcScores(a){
  // MSQ scores
  const msqScores={};
  let idx=0;
  MSQ_DIMS.forEach(d=>{
    const vals=d.items.map((_,li)=>a.answers[idx+li]).filter(v=>v!==undefined);
    const sum=vals.reduce((x,y)=>x+y,0);
    msqScores[d.id]={sum,count:vals.length,total:d.items.length,avg:vals.length?sum/vals.length:null};
    idx+=d.items.length;
  });
  const msqVals=Object.values(a.answers).filter((_,i)=>i<18);
  const msqGlobal=msqVals.length?msqVals.reduce((x,y)=>x+y,0)/msqVals.length:0;

  // ATH scores
  const athScores={};
  if(a.hasAthletics){
    let aidx=18;
    ATH_DIMS.forEach(d=>{
      const vals=d.items.map((_,li)=>a.answers[aidx+li]).filter(v=>v!==undefined);
      const sum=vals.reduce((x,y)=>x+y,0);
      athScores[d.id]={sum,count:vals.length,total:d.items.length,avg:vals.length?sum/vals.length:null};
      aidx+=d.items.length;
    });
  }
  const athVals=Object.values(a.answers).filter((_,i)=>i>=18);
  const athGlobal=athVals.length?athVals.reduce((x,y)=>x+y,0)/athVals.length:0;

  return{msqScores,msqGlobal,athScores,athGlobal,totalAnswered:Object.keys(a.answers).length};
}

function tier(avg){ if(avg===null)return"m"; return avg>=1.5?"h":avg>=0.8?"m":"l"; }
function tierLabel(t){ return t==="h"?"Favourable profile":t==="m"?"Standard profile":"Priority attention"; }

const MSQ_INTERP={
  B:{h:"Effective emotional regulation — athlete recovers quickly from errors and manages competitive stress well. Asset in pressure situations.",
     m:"Partial regulation — some inconsistency under high pressure. Recommend breathing and reset routines in training.",
     l:"Emotional regulation requires targeted support. Not eliminatory at U-13. Refer to PATHWAY mental skills track."},
  C:{h:"Stable self-confidence — not destabilised by opposition or results. Strong predictive profile for elite progression.",
     m:"Developing confidence — context-dependent. Confidence is highly malleable at this age through targeted mental training.",
     l:"Low confidence at this stage. Not eliminatory. Confidence responds strongly to structured intervention."},
  E:{h:"Strong intrinsic motivation — athlete practises for mastery and enjoyment. Most robust predictor of long-term persistence in elite sport.",
     m:"Mixed motivation profile — some external dependency. Reinforce autonomy and self-directed goal setting.",
     l:"External motivation dominance. Explore underlying drivers. Sustainability risk if external conditions change."}
};

const ATH_INTERP={
  "ATH-A":{h:"Strong appetite for volume training — athlete embraces load increase and finds pride in effort regardless of outcome. Key predictor of training adherence in athletics.",
           m:"Moderate tolerance for volume — some resistance to repetitive or long sessions. Structure gradual load progression with positive reinforcement.",
           l:"Low volume motivation at this stage. Not eliminatory. Requires motivational coaching and progressive load introduction."},
  "ATH-B":{h:"Excellent competitive response to time/distance — athlete uses results as fuel for improvement rather than a threat to self-worth. Strong athletics-specific predictor.",
           m:"Developing result processing — some sensitivity to disappointing performances. Build self-comparison protocols over external comparison.",
           l:"Result sensitivity flagged. High risk of demotivation after poor performances. Priority: attribution retraining."},
  "ATH-C":{h:"Strong effort attribution under fatigue — athlete distinguishes effort effort from capacity and maintains internal locus of control in final race stages.",
           m:"Partial effort regulation — some external attribution under fatigue. Introduce split-time monitoring and race finish protocols.",
           l:"Effort attribution under fatigue requires attention. Athlete may underperform in final phases. Introduce race pacing sessions."}
};

function globalInterpText(avg, max=2){
  const pct=avg/max;
  if(pct>=0.75)return"Highly favourable profile — strong psychological foundations across all assessed dimensions.";
  if(pct>=0.4)return"Standard profile — targeted developmental work on flagged dimensions recommended before next evaluation.";
  return"Mental support recommended as priority — coordinate with PATHWAY mental skills specialist.";
}

// ─── EXPORT ────────────────────────────────────────────────────────────────────
function exportJSON(id){
  const a=getAthlete(id);
  const{msqScores,msqGlobal,athScores,athGlobal,totalAnswered}=calcScores(a);
  const payload={
    meta:{tool:"PATHWAY-U13-MSQ18",version:"2.0",exportedAt:new Date().toISOString(),programme:"MAS Foundation PATHWAY"},
    athlete:{id:a.id,name:a.name,dob:a.dob,sport:a.sport,hasAthletics:a.hasAthletics,date:a.date,evaluator:a.evaluator,location:a.location,notes:a.notes},
    msq:{globalAvg:parseFloat(msqGlobal.toFixed(4)),totalAnswered:Math.min(totalAnswered,18),totalItems:18,
      dimensions:Object.fromEntries(MSQ_DIMS.map(d=>{const s=msqScores[d.id];return[d.id,{name:d.name,avg:s.avg!==null?parseFloat(s.avg.toFixed(4)):null,count:s.count,total:s.total}];}))},
    athletics:a.hasAthletics?{globalAvg:parseFloat(athGlobal.toFixed(4)),totalAnswered:Object.keys(a.answers).filter(k=>parseInt(k)>=18).length,totalItems:18,
      dimensions:Object.fromEntries(ATH_DIMS.map(d=>{const s=athScores[d.id];return[d.id,{name:d.name,avg:s?.avg!==null?parseFloat(s.avg.toFixed(4)):null,count:s?.count||0,total:s?.total||6}];}))
    }:null,
    rawAnswers:a.answers
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const link=document.createElement("a");
  link.href=url; link.download=`PATHWAY_U13_${a.name.replace(/\s+/g,"_")}_${a.date||"nodate"}.json`; link.click();
  URL.revokeObjectURL(url); toast("JSON exported for "+a.name);
}

function exportAllJSON(){
  if(!athletes.length){alert("No athletes to export.");return;}
  const payload={meta:{tool:"PATHWAY-U13-MSQ18",version:"2.0",exportedAt:new Date().toISOString(),totalAthletes:athletes.length},
    athletes:athletes.map(a=>{const{msqScores,msqGlobal,athScores,athGlobal,totalAnswered}=calcScores(a);
      return{athlete:{id:a.id,name:a.name,dob:a.dob,sport:a.sport,hasAthletics:a.hasAthletics,date:a.date,evaluator:a.evaluator},
        msq:{globalAvg:parseFloat(msqGlobal.toFixed(4)),dimensions:Object.fromEntries(MSQ_DIMS.map(d=>{const s=msqScores[d.id];return[d.id,{name:d.name,avg:s.avg!==null?parseFloat(s.avg.toFixed(4)):null}];}))},
        athletics:a.hasAthletics?{globalAvg:parseFloat(athGlobal.toFixed(4)),dimensions:Object.fromEntries(ATH_DIMS.map(d=>{const s=athScores[d.id];return[d.id,{name:d.name,avg:s?.avg!==null?parseFloat(s.avg.toFixed(4)):null}];}))
        }:null,rawAnswers:a.answers};})};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const link=document.createElement("a");
  link.href=url; link.download=`PATHWAY_U13_ALL_${new Date().toISOString().slice(0,10)}.json`; link.click();
  URL.revokeObjectURL(url); toast(`Exported ${athletes.length} athletes`);
}

function printReport(){ window.print(); }

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2800); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadStorage();
document.getElementById("f-date").value=new Date().toISOString().slice(0,10);
renderList();
