<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PATHWAY · Assessment Hub · MAS Foundation</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0C2340;--navy2:#1A3A5C;
  --gold:#B8902A;--gold-l:#FFF8E6;--gold-d:#8a6a1a;--gold-pale:#FFF3D6;
  --teal:#1A7A6E;--teal-l:#E4F4F2;--teal-m:#2AA090;
  --blue:#1A56A0;--blue-l:#E8F0FB;
  --amber:#C07820;--amber-l:#FEF5E6;
  --coral:#D85A30;--coral-l:#FAECE7;
  --bg:#F4F3F0;--surface:#FFFFFF;--surface2:#FAFAF8;
  --border:#E4E0D8;--border2:#D0CCC4;
  --text:#1A1A18;--text2:#4A4844;--muted:#8A8680;
  --shadow:0 2px 8px rgba(12,35,64,.08);
  --shadow-md:0 4px 16px rgba(12,35,64,.12);
  --shadow-lg:0 8px 32px rgba(12,35,64,.16);
}

body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:15px;
  line-height:1.55;
}

/* ── LAYOUT ── */
.shell{max-width:860px;margin:0 auto;padding:28px 16px 60px}

/* ── HEADER ── */
.site-header{
  display:flex;align-items:center;gap:16px;
  padding:0 0 24px;
  border-bottom:1px solid var(--border);
  margin-bottom:24px;
}
.mas-logo{
  width:48px;height:48px;
  background:var(--navy);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:var(--shadow);
}
.mas-logo span{
  font-family:'DM Serif Display',serif;
  font-size:14px;color:var(--gold);letter-spacing:.5px;
}
.site-title h1{
  font-family:'DM Serif Display',serif;
  font-size:22px;font-weight:400;color:var(--navy);
  line-height:1.2;
}
.site-title p{font-size:12px;color:var(--muted);margin-top:2px;}
.site-tools{display:flex;gap:8px;align-items:center;margin-left:auto;}

/* ── NAV ── */
.main-nav{
  display:flex;gap:4px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:5px;
  margin-bottom:24px;
  box-shadow:var(--shadow);
}
.nav-tab{
  flex:1;padding:10px 8px;
  border:none;background:transparent;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  color:var(--muted);cursor:pointer;
  border-radius:10px;
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.nav-tab:hover{background:var(--bg);color:var(--text);}
.nav-tab.active{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(12,35,64,.25);}
.nav-tab.active .tab-count{background:rgba(255,255,255,.2);}
.tab-count{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--gold);color:#fff;
  font-size:10px;font-weight:700;
  min-width:20px;height:20px;padding:0 6px;
  border-radius:10px;
}

/* ── CARD ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.card+.card{margin-top:16px;}

/* ── SECTION LABEL ── */
.section-label{
  font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted);margin:20px 0 10px;
}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;
  border-radius:10px;border:1.5px solid var(--border);
  background:var(--surface);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;color:var(--text);
  transition:all .18s;white-space:nowrap;
}
.btn:hover{border-color:var(--navy2);color:var(--navy);background:var(--bg);}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-primary:hover{background:var(--navy2);border-color:var(--navy2);color:#fff;}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold);}
.btn-gold:hover{background:var(--gold-d);border-color:var(--gold-d);color:#fff;}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal);}
.btn-danger{color:#A32D2D;border-color:#F09595;}
.btn-danger:hover{background:#FCEBEB;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;}

/* ── TOOL BADGE ── */
.tool-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;letter-spacing:.3px;
  padding:3px 10px;border-radius:20px;color:#fff;
}
.tool-badge.MSQ{background:var(--navy);}
.tool-badge.ACSI{background:var(--blue);}
.tool-badge.MTQ{background:var(--amber);}
.tool-badge.PSYJ{background:var(--gold);}

/* ── LIST VIEW ── */
.list-toolbar{
  padding:16px 20px;
  display:flex;gap:10px;align-items:center;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.search-input{
  flex:1;padding:9px 14px;
  border:1.5px solid var(--border);border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:13px;
  background:var(--surface);color:var(--text);
  outline:none;transition:border-color .18s;
}
.search-input:focus{border-color:var(--navy);}
.athlete-table{width:100%;border-collapse:collapse;}
.athlete-table th{
  font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  color:var(--muted);text-align:left;
  padding:10px 20px;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.athlete-table td{
  padding:13px 20px;
  border-bottom:1px solid var(--border);
  font-size:13px;vertical-align:middle;
}
.athlete-table tr:last-child td{border-bottom:none;}
.athlete-table tbody tr{transition:background .12s;}
.athlete-table tbody tr:hover td{background:var(--surface2);}
.athlete-name{font-weight:600;color:var(--navy);}
.athlete-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.status-chip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;
}
.status-chip.done{background:var(--teal-l);color:var(--teal);}
.status-chip.part{background:var(--gold-pale);color:var(--gold-d);}
.status-chip.none{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.prog-mini{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px;}
.prog-mini-fill{height:100%;border-radius:2px;}
.prog-mini-fill.done{background:var(--teal);}
.prog-mini-fill.part{background:var(--gold);}
.actions-row{display:flex;gap:5px;flex-wrap:wrap;}
.empty-state{padding:56px 24px;text-align:center;}
.empty-icon{
  width:72px;height:72px;border-radius:20px;
  background:var(--bg);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;margin:0 auto 16px;
}
.empty-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--navy);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}

/* ── INTAKE FORM ── */
.intake-header{
  padding:24px 28px 20px;
  border-bottom:1px solid var(--border);
}
.intake-header h2{
  font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;
  color:var(--navy);margin-bottom:4px;
}
.intake-header p{font-size:13px;color:var(--muted);}
.form-body{padding:24px 28px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.form-grid .full{grid-column:1/-1;}
.field-label{
  font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;
  color:var(--muted);display:block;margin-bottom:6px;
}
.field-input{
  width:100%;padding:10px 14px;
  border:1.5px solid var(--border);border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:14px;
  background:var(--surface);color:var(--text);
  outline:none;transition:border-color .18s;
}
.field-input:focus{border-color:var(--navy);}
.field-input::placeholder{color:var(--muted);}

/* router card */
.router-reveal{margin-bottom:20px;animation:slideDown .25s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.router-card{
  border-radius:12px;overflow:hidden;
  border:1.5px solid var(--border);
}
.router-top{
  padding:12px 18px;
  display:flex;align-items:center;gap:12px;
}
.router-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
}
.router-label{font-size:13px;font-weight:600;color:#fff;flex:1;}
.router-items{font-size:11px;color:rgba(255,255,255,.7);}
.router-detail{
  padding:12px 18px;
  background:var(--surface);
  font-size:12px;color:var(--text2);line-height:1.6;
}
.router-detail strong{color:var(--navy);}

/* ── QUESTIONNAIRE ── */
.q-shell{display:flex;flex-direction:column;min-height:500px;}

/* progress header */
.q-progress-hdr{
  padding:16px 24px 14px;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
}
.q-progress-meta{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;
}
.q-athlete-name{
  font-family:'DM Serif Display',serif;font-size:17px;
  font-weight:400;color:var(--navy);
}
.q-count{font-size:12px;color:var(--muted);}
.q-bar-outer{
  height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:10px;
}
.q-bar-inner{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.q-bar-inner.MSQ{background:linear-gradient(90deg,var(--navy),var(--navy2));}
.q-bar-inner.ACSI{background:linear-gradient(90deg,var(--blue),#2268B8);}
.q-bar-inner.MTQ{background:linear-gradient(90deg,var(--amber),#D08830);}
.q-bar-inner.PSYJ{background:linear-gradient(90deg,var(--gold),#C8982A);}
.q-bar-inner.ath{background:linear-gradient(90deg,var(--teal),var(--teal-m));}
.q-chips{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.q-dim-chip{
  font-size:11px;font-weight:600;padding:3px 10px;
  border-radius:20px;
}
.q-dim-chip.navy{background:#EAF0F6;color:var(--navy);border:1px solid #C5D5E8;}
.q-dim-chip.blue{background:var(--blue-l);color:var(--blue);border:1px solid #A8C0E8;}
.q-dim-chip.amber{background:var(--amber-l);color:var(--amber-d,#7a5010);border:1px solid #D4A843;}
.q-dim-chip.teal{background:var(--teal-l);color:var(--teal);border:1px solid #9FE1CB;}
.q-dim-chip.gold{background:var(--gold-pale);color:var(--gold-d);border:1px solid var(--gold);}
.rev-tag{
  font-size:10px;padding:2px 8px;border-radius:20px;
  background:#FAECEA;color:#A32D2D;border:1px solid #F09595;
}
.module-transition{
  padding:10px 20px;
  background:var(--teal-l);border-bottom:1px solid #9FE1CB;
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:600;color:var(--teal);
}

/* question body */
.q-body{
  flex:1;padding:32px 28px 20px;
}
.q-number{
  font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;
}
.q-text{
  font-family:'DM Serif Display',serif;
  font-size:22px;font-weight:400;line-height:1.5;
  color:var(--navy);margin-bottom:36px;min-height:64px;
}

/* 3-level scale */
.scale-3{display:flex;gap:12px;}
.lb3{
  flex:1;border:2px solid var(--border);border-radius:16px;
  background:var(--surface);cursor:pointer;
  padding:20px 10px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.lb3:hover{border-color:var(--border2);background:var(--bg);transform:translateY(-2px);box-shadow:var(--shadow);}
.lb3.sel{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.lb3.sel-0{background:#F5F4F2;border-color:#A0A09C;}
.lb3.sel-1{background:var(--gold-pale);border-color:var(--gold);}
.lb3.sel-2{background:var(--teal-l);border-color:var(--teal);}
.lb3-em{font-size:30px;line-height:1;}
.lb3-label{font-size:12px;font-weight:600;color:var(--text);}
.lb3.sel-2 .lb3-label{color:var(--teal);}
.lb3.sel-1 .lb3-label{color:var(--gold-d);}
.lb3-sub{font-size:10px;color:var(--muted);text-align:center;line-height:1.3;}

/* 4-level scale (ACSI) */
.scale-4{display:flex;gap:10px;}
.lb4{
  flex:1;border:2px solid var(--border);border-radius:14px;
  background:var(--surface);cursor:pointer;
  padding:18px 8px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:all .18s;
}
.lb4:hover{border-color:var(--blue);background:var(--blue-l);transform:translateY(-2px);}
.lb4.sel{border-color:var(--blue);background:var(--blue-l);transform:translateY(-3px);box-shadow:var(--shadow-md);}
.lb4-n{font-size:22px;font-weight:600;color:var(--text);}
.lb4.sel .lb4-n{color:var(--blue);}
.lb4-w{font-size:9px;color:var(--muted);text-align:center;line-height:1.3;}
.lb4.sel .lb4-w{color:var(--blue);font-weight:600;}

/* 5-level scale (MTQ) */
.scale-5{display:flex;gap:8px;}
.lb5{
  flex:1;border:2px solid var(--border);border-radius:12px;
  background:var(--surface);cursor:pointer;
  padding:16px 4px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:all .18s;
}
.lb5:hover{border-color:var(--amber);background:var(--amber-l);transform:translateY(-2px);}
.lb5.sel{border-color:var(--amber);background:var(--amber-l);transform:translateY(-3px);box-shadow:var(--shadow-md);}
.lb5-n{font-size:18px;font-weight:600;color:var(--text);}
.lb5.sel .lb5-n{color:var(--amber);}
.lb5-w{font-size:8px;color:var(--muted);text-align:center;line-height:1.2;}
.lb5.sel .lb5-w{color:var(--amber-d,#7a5010);}

/* navigation bar */
.q-nav{
  padding:14px 24px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  background:var(--surface2);
}
.nav-hint{font-size:12px;}
.nav-hint.ok{color:var(--teal);}
.nav-hint.req{color:var(--coral);}
.spc{flex:1;}
.skip-link{font-size:11px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 8px;border-radius:6px;}
.skip-link:hover{background:var(--bg);color:var(--text);}

/* PSY-J evaluator */
.psyj-intro{
  padding:14px 24px;
  background:var(--gold-pale);
  border-bottom:1px solid #DEC898;
  display:flex;gap:10px;align-items:flex-start;
  font-size:12px;color:var(--gold-d);
}
.psyj-intro-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.psyj-dims-list{display:flex;flex-direction:column;gap:12px;padding:20px 24px;}
.psyj-dim{
  border:1.5px solid var(--border);border-radius:14px;overflow:hidden;
  transition:border-color .18s;
}
.psyj-dim:focus-within{border-color:var(--gold);}
.psyj-dim-hdr{
  padding:12px 18px;
  background:var(--surface2);
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
}
.psyj-dim-title{font-weight:600;font-size:13px;color:var(--navy);}
.psyj-score-pill{
  font-size:10px;font-weight:700;padding:2px 10px;
  border-radius:20px;background:var(--gold);color:#fff;
}
.psyj-dim-desc{font-size:11px;color:var(--muted);padding:10px 18px 6px;}
.psyj-scale{display:flex;gap:6px;padding:8px 18px 14px;}
.psyj-btn{
  flex:1;border:1.5px solid var(--border);border-radius:10px;
  background:var(--surface);cursor:pointer;
  padding:10px 4px;text-align:center;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  color:var(--muted);transition:all .15s;
}
.psyj-btn:hover{border-color:var(--gold);background:var(--gold-pale);color:var(--gold-d);}
.psyj-btn.sel{background:var(--gold);border-color:var(--gold);color:#fff;}
.psyj-indicators{font-size:10px;color:var(--muted);padding:0 18px 10px;line-height:1.8;}
.psyj-note{padding:0 18px 14px;}
.psyj-note textarea{
  width:100%;padding:8px 12px;
  border:1.5px solid var(--border);border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:12px;
  resize:vertical;min-height:44px;background:var(--bg);
  color:var(--text);outline:none;transition:border-color .18s;
}
.psyj-note textarea:focus{border-color:var(--gold);}

/* ── REPORT ── */
.rep-wrapper{padding:28px 32px;}
@media print{body{background:#fff}.shell{padding:0}.card{border:none;box-shadow:none;border-radius:0}.rep-wrapper{padding:20px 24px}.no-print{display:none!important}.dim-block{page-break-inside:avoid}}
.rep-masthead{
  display:flex;justify-content:space-between;align-items:flex-start;gap:16px;
  padding-bottom:18px;margin-bottom:18px;
  border-bottom:2px solid var(--navy);
}
.rep-brand{display:flex;align-items:center;gap:12px;}
.rep-brand-logo{
  width:40px;height:40px;background:var(--navy);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.rep-brand-logo span{font-family:'DM Serif Display',serif;font-size:12px;color:var(--gold);}
.rep-brand-name{font-size:14px;font-weight:600;color:var(--navy);}
.rep-brand-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.rep-date-block{text-align:right;font-size:10px;color:var(--muted);line-height:1.7;}
.rep-title{
  font-family:'DM Serif Display',serif;
  font-size:26px;font-weight:400;color:var(--navy);margin-bottom:4px;
}
.rep-subtitle{font-size:12px;color:var(--muted);margin-bottom:18px;}

.athlete-info-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;
}
.info-cell{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;
}
.info-label{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.info-value{font-size:13px;font-weight:600;color:var(--text);}

/* global score */
.global-score-card{
  border-radius:14px;padding:20px 24px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;gap:16px;
  position:relative;overflow:hidden;
}
.global-score-card::after{
  content:'';position:absolute;right:-20px;top:-20px;
  width:100px;height:100px;border-radius:50%;
  background:rgba(255,255,255,.05);
}
.global-score-card.MSQ{background:linear-gradient(135deg,var(--navy),var(--navy2));}
.global-score-card.ACSI{background:linear-gradient(135deg,var(--blue),#2268B8);}
.global-score-card.MTQ{background:linear-gradient(135deg,var(--amber),#D08830);}
.global-score-card.PSYJ{background:linear-gradient(135deg,var(--gold),#C8982A);}
.global-score-card.ATH{background:linear-gradient(135deg,var(--teal),var(--teal-m));}
.gs-left{}
.gs-label{font-size:11px;color:rgba(255,255,255,.65);margin-bottom:4px;}
.gs-value{font-size:40px;font-weight:300;color:#fff;line-height:1;font-family:'DM Serif Display',serif;}
.gs-of{font-size:18px;color:rgba(255,255,255,.5);}
.gs-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:5px;}
.gs-right{text-align:right;max-width:260px;}
.gs-interp{font-size:12px;color:rgba(255,255,255,.9);font-weight:500;line-height:1.55;}
.gs-band{
  display:inline-block;margin-top:6px;
  font-size:10px;padding:2px 10px;border-radius:20px;
  background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);
}

/* 4C grid */

// ═══════════ ITEMS ═══════════
function totalFor(a){if(a.tool==="MSQ")return a.hasAthletics?36:18;if(a.tool==="ACSI")return 28;if(a.tool==="MTQ")return 48;return 5;}
function itemsFor(a){
  if(a.tool==="MSQ"){let it=[];MSQ_DIMS.forEach(d=>d.items.forEach(q=>it.push({q,dim:d.id,name:d.name,module:"msq",rev:false})));if(a.hasAthletics)ATH_DIMS.forEach(d=>d.items.forEach(q=>it.push({q,dim:d.id,name:d.name,module:"ath",rev:false})));return it;}
  if(a.tool==="ACSI"){let it=[];SUBS.forEach(s=>s.items.forEach(q=>it.push({q,dim:s.id,name:s.name,module:"acsi",rev:false})));return it;}
  if(a.tool==="MTQ"){let it=[];DIMS.forEach(d=>d.items.forEach(i=>it.push({q:i.q,dim:d.id,name:d.c,module:"mtq",rev:i.rev})));return it;}
  return PSYJ_DIMS.map(d=>({q:d.desc,dim:d.id,name:d.name,module:"psyj",rev:false}));
}

// ═══════════ LIST ═══════════
function renderList(){

function resume(id){curId=id;curIdx=findFirst();document.getElementById("tab-q").style.display="";showTab("questionnaire");}

function findFirst(){const a=cur(),items=itemsFor(a);for(let i=0;i<items.length;i++)if(a.answers[i]===undefined)return i;return items.length-1;}

// ═══════════ INTAKE ═══════════

// ═══════════ QUESTIONNAIRE ═══════════

  <div class="prog-bar">

    <span class="dim-chip">${item.dim} — ${item.name}</span>

function answer(v){const a=cur();a.answers[curIdx]=v;save();renderQ();}
function goQ(dir){const a=cur();curIdx=Math.max(0,Math.min(itemsFor(a).length-1,curIdx+dir));renderQ();}
function skipRep(){if(Object.keys(cur().answers).length===0){alert("Answer at least one item first.");return;}if(confirm("Generate report with partial data?"))finishQ();}

// ═══════════ SCORING (exact from original files) ═══════════
function scoreItem(raw,rev){return rev?(6-raw):raw;}
function calcMSQ(a){
  const ds={};let idx=0;
  MSQ_DIMS.forEach(d=>{const v=d.items.map((_,li)=>a.answers[idx+li]).filter(v=>v!==undefined);const s=v.reduce((x,y)=>x+y,0);ds[d.id]={sum:s,count:v.length,avg:v.length?s/v.length:null};idx+=d.items.length;});
  const ath={};if(a.hasAthletics){ATH_DIMS.forEach(d=>{const v=d.items.map((_,li)=>a.answers[idx+li]).filter(v=>v!==undefined);const s=v.reduce((x,y)=>x+y,0);ath[d.id]={sum:s,count:v.length,avg:v.length?s/v.length:null};idx+=d.items.length;});}
  const mv=Object.entries(a.answers).filter(([k])=>parseInt(k)<18).map(([,v])=>v);
  const av=Object.entries(a.answers).filter(([k])=>parseInt(k)>=18).map(([,v])=>v);
  return{ds,ath,global:mv.length?mv.reduce((x,y)=>x+y,0)/mv.length:0,athGlobal:av.length?av.reduce((x,y)=>x+y,0)/av.length:0};
}
function calcACSI(a){
  const sub={};SUBS.forEach((s,si)=>{const v=s.items.map((_,li)=>a.answers[si*4+li]).filter(v=>v!==undefined);const sum=v.reduce((x,y)=>x+y,0);sub[s.id]={sum,count:v.length,avg:v.length?sum/v.length:null};});
  const all=Object.values(a.answers),total=all.reduce((x,y)=>x+y,0);
  return{sub,total,answered:all.length};
}
function calcMTQ(a){
  const ds={};DIMS.forEach((d,di)=>{const v=d.items.map((it,li)=>{const val=a.answers[di*8+li];return val!==undefined?scoreItem(val,it.rev):undefined;}).filter(v=>v!==undefined);const sum=v.reduce((x,y)=>x+y,0);ds[d.id]={sum,count:v.length,avg:v.length?sum/v.length:null};});
  const total=Object.values(ds).reduce((x,s)=>x+s.sum,0);
  return{ds,total,c1:ds["C1"].sum,c2:ds["C2a"].sum+ds["C2b"].sum,c3:ds["C3a"].sum+ds["C3b"].sum,c4:ds["C4"].sum,answered:Object.keys(a.answers).length};
}
function calcPSYJ(a){const s=a.psyjScores||{},v=Object.values(s);return{s,global:v.length?v.reduce((x,y)=>x+y,0)/v.length:0};}

// Tier functions — exact logic from originals
function tACSI(score,max){if(score===null)return"m";const r=score/max;return r>=0.75?"h":r>=0.5?"m":"l";}
function tMTQ(score,max){if(score===null||score===undefined)return"m";const r=score/max;return r>=0.8?"h":r>=0.6?"m":"l";}
function tMSQ(avg){if(avg===null)return"m";return avg>=1.5?"h":avg>=0.8?"m":"l";}
function tPSYJ(sc){if(sc===undefined)return"m";return sc>=3?"h":sc>=1?"m":"l";}
function tGlobACSI(v){return v>=63?"h":v>=42?"m":"l";}
function tGlobMTQ(v){return v>=192?"h":v>=144?"m":"l";}

    body=`<div class="rep-title">MAS-ACSI28 · Psychological Assessment</div><div class="rep-subtitle">Athletic Coping Skills Inventory · 7 sub-scales · 28 items · Scale 0–3 (Never → Almost Always)</div>${grid}

function buildPayload(a){

  else if(a.tool==="ACSI"){const{sub,total,answered}=calcACSI(a);scores={tool:"PATHWAY-U14-ACSI28",total,totalMax:84,answered,subs:Object.fromEntries(Object.entries(sub).map(([k,v])=>[k,{name:SUBS.find(s=>s.id===parseInt(k))?.name,sum:v.sum,max:12,count:v.count}]))};}
  else if(a.tool==="MTQ"){const{ds,total,c1,c2,c3,c4,answered}=calcMTQ(a);scores={tool:"PATHWAY-U15-MTQ48",total4C:total,totalMax:240,answered,c1,c2,c3,c4,dims:Object.fromEntries(Object.entries(ds).map(([k,v])=>[k,{label:DIMS.find(d=>d.id===k)?.c,sum:v.sum,max:40,count:v.count}]))};}
  else if(a.tool==="PSYJ"){const{s,global}=calcPSYJ(a);scores={tool:"PATHWAY-PSY-J",global:+(global+1).toFixed(4),globalMax:5,dims:s,notes:a.psyjNotes||{}};}
  return{meta:{hub:"PATHWAY-ASSESSMENT-HUB-V2",version:"2.0",exportedAt:new Date().toISOString()},athlete:{id:a.id,name:a.name,dob:a.dob,age:a.age,sport:a.sport,tool:a.tool,date:a.date,evaluator:a.evaluator,location:a.location,notes:a.notes},scores,rawAnswers:a.tool==="PSYJ"?a.psyjScores:a.answers};
}
function exportOne(id){const a=getA(id),p=buildPayload(a);const b=new Blob([JSON.stringify(p,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const l=document.createElement("a");l.href=u;l.download=`PATHWAY_${a.tool}_${a.name.replace(/\s+/g,"_")}_${a.date||"nodate"}.json`;l.click();URL.revokeObjectURL(u);toast("JSON exported — "+a.name);}

// Override: showTab
function showTab(name){
  ["list","intake","questionnaire","report"].forEach(v=>{
    document.getElementById("view-"+v).style.display=v===name?"block":"none";
    const tid=v==="questionnaire"?"q":v==="report"?"rep":v;
    const t=document.getElementById("tab-"+tid);
    if(t){t.classList.toggle("active",v===name);}
  });
  if(name==="list")renderList();
  if(name==="questionnaire")renderQ();
  if(name==="report")renderReport();

  </tr></thead><tbody>`;

      <td>

        <span style="font-size:11px;color:var(--muted)">${ans}/${total}</span>
      </td>
      <td><span class="status-chip ${st}">${stEmoji}${stLabel}</span></td>

  body.innerHTML=html;

    </div>
    <div class="section-label">MSQ-U13 — 3 Dimensions</div>
    ${MSQ_DIMS.map(d=>{const ds=s.ds[d.id];const t=tMSQ(ds.avg);const pct=ds.avg!==null?Math.round((ds.avg/2)*100):0;return`<div class="dim-block"><div class="dim-top"><span class="dim-name">Dim. ${d.id} — ${d.name}</span><span class="dim-score-badge ${t}">${ds.avg!==null?ds.avg.toFixed(2)+" / 2.00":"No data"} · ${t==="h"?"Favourable":t==="m"?"Standard":"Priority"}</span></div><div class="bar-labels"><span>0.00</span><span>0.50</span><span>1.00</span><span>1.50</span><span>2.00</span></div><div class="bar-outer"><div class="bar-inner ${t}" style="width:${pct}%"></div></div><div class="dim-answered">${ds.count} of 6 items answered · Favourable ≥ 1.50 · Priority < 0.80</div><div class="dim-interp ${t}">${MSQ_INTERP[d.id][t]}</div></div>`;}).join("")}
    ${a.hasAthletics?`<div class="global-score-card ATH" style="margin-top:14px"><div class="gs-left"><div class="gs-label">Athletics Module Global</div><div class="gs-value">${s.athGlobal.toFixed(2)}<span class="gs-of"> / 2.00</span></div><div class="gs-sub">${av} of 18 items answered</div></div><div class="gs-right"><div class="gs-interp">${s.athGlobal>=1.5?"Strong athletics-specific psychological profile.":s.athGlobal>=0.8?"Standard — targeted work on athletics constructs.":"Priority support on athletics-specific dimensions."}</div></div></div>
    <div class="section-label">MAS-PSY-ATH-U13 — Athletics Constructs</div>
    ${ATH_DIMS.map(d=>{const ds=s.ath[d.id];const t=tMSQ(ds?.avg);const pct=ds?.avg!==null?Math.round(((ds?.avg??0)/2)*100):0;return`<div class="dim-block"><div class="dim-top"><span class="dim-name">${d.id} — ${d.name}</span><span class="dim-score-badge ${t}">${ds?.avg!==null?ds.avg.toFixed(2)+" / 2.00":"No data"}</span></div><div class="bar-outer"><div class="bar-inner ${t}" style="width:${pct}%"></div></div><div class="dim-answered">${ds?.count||0} of 6 items</div><div class="dim-interp ${t}">${ATH_INTERP[d.id]?.[t]||""}</div></div>`;}).join("")}`:""}
    <div class="disclaimer">No score on any dimension justifies exclusion before age 14. Intrinsic Motivation (Dim. E) is the strongest long-term predictor of elite persistence. Psychological data is contextual information for the RC narrative — never a standalone elimination criterion. Confidential — MAS Foundation / Qatar Foundation internal use only.</div>`;
  }

  else if(a.tool==="ACSI"){
    const{sub,total,answered}=calcACSI(a);
    const gt=tGlobACSI(total);
    body=`<div class="rep-title">MAS-ACSI28 · Psychological Assessment</div>
    <div class="rep-subtitle">Athletic Coping Skills Inventory · 7 sub-scales × 4 items · Scale 0–3 (Never → Almost Always)</div>
    ${infoGrid}
    <div class="global-score-card ACSI">
      <div class="gs-left"><div class="gs-label">Total Score</div><div class="gs-value">${total}<span class="gs-of"> / 84</span></div><div class="gs-sub">${answered} of 28 items answered</div></div>
      <div class="gs-right"><div class="gs-interp">${total>=63?"Elite coping profile — strong psychological skills across all competitive dimensions.":total>=42?"Standard competitive profile — targeted development on weak sub-scales recommended.":"Targeted support recommended — coordinate with the PATHWAY mental skills specialist."}</div><span class="gs-band">${total>=63?"Elite coping (≥ 63)":total>=42?"Standard (42–63)":"Support recommended (< 42)"}</span></div>
    </div>
    <div class="score-summary-row">
      <div class="ss-card"><div class="ss-label">Total</div><div class="ss-val" style="color:${gt==="h"?"var(--teal)":gt==="m"?"var(--amber)":"var(--coral)"}">${total}/84</div></div>
      <div class="ss-card"><div class="ss-label">Attention threshold</div><div class="ss-val">≥ 42</div></div>
      <div class="ss-card"><div class="ss-label">Strong threshold</div><div class="ss-val">≥ 63</div></div>
      <div class="ss-card"><div class="ss-label">Per sub-scale max</div><div class="ss-val">12</div></div>
    </div>
    <div class="section-label">Sub-scale breakdown</div>
    ${SUBS.map(s=>{const sc=sub[s.id];const t=tACSI(sc.sum,12);const pct=Math.round((sc.sum/12)*100);return`<div class="dim-block"><div class="dim-top"><span class="dim-name">Sub-scale ${s.id} — ${s.name}</span><span class="dim-score-badge ${t}">${sc.sum} / 12 · ${t==="h"?"Strong":t==="m"?"Standard":"Attention"}</span></div><div class="bar-labels"><span>0</span><span>3</span><span>6</span><span>9</span><span>12</span></div><div class="bar-outer"><div class="bar-inner ${t}" style="width:${pct}%"></div></div><div class="dim-answered">${sc.count} of 4 items · Attention < 6 · Strong ≥ 9</div><div class="dim-interp ${t}">${SUB_INTERP[s.id][t]}</div></div>`;}).join("")}
    <div class="rec-card"><div class="rec-title">Evaluator recommendations</div><div class="rec-text">${(()=>{const w=SUBS.filter(s=>sub[s.id].sum<6).map(s=>s.name),st=SUBS.filter(s=>sub[s.id].sum>=9).map(s=>s.name);let r="";if(st.length)r+=`<strong>Strengths:</strong> ${st.join(", ")}. `;if(w.length)r+=`<strong>Priority sub-scales (score < 6/12):</strong> ${w.join(", ")}. Coordinate with the PATHWAY mental skills specialist. `;r+=`<strong>Note:</strong> Freedom from Worry (Sub-scale 5) is strongly linked to cultural and family context — always contextualise for the Qatari multicultural population. No individual score justifies exclusion.`;return r;})()}</div></div>
    <div class="disclaimer">Coachability (Sub-scale 1) is the most predictive sub-scale for technical progression speed. No individual score justifies exclusion. Confidential — MAS Foundation / Qatar Foundation internal use only.</div>`;
  }

  else if(a.tool==="MTQ"){
    const{ds,total,c1,c2,c3,c4,answered}=calcMTQ(a);
    const gt=tGlobMTQ(total);
    body=`<div class="rep-title">MAS-MTQ48 · Psychological Assessment</div>
    <div class="rep-subtitle">Mental Toughness Questionnaire · 4C Model · 6 sub-dimensions · 48 items · Scale 1–5 · Reverse scoring applied</div>
    ${infoGrid}
    <div class="global-score-card MTQ">
      <div class="gs-left"><div class="gs-label">4C Total Score</div><div class="gs-value">${total}<span class="gs-of"> / 240</span></div><div class="gs-sub">${answered} of 48 items answered</div></div>
      <div class="gs-right"><div class="gs-interp">${total>=192?"High mental toughness — strong 4C profile. Highly favourable for long-term elite pathway.":total>=144?"Development zone — targeted intervention on specific 4C dimensions recommended.":"Priority support — coordinate with PATHWAY mental skills specialist. All dimensions remain malleable at 15–16."}</div><span class="gs-band">${total>=192?"High toughness (≥ 192)":total>=144?"Development zone (144–192)":"Priority support (< 144)"}</span></div>
    </div>
    <div class="section-label">4C Group Scores</div>
    <div class="four-c-grid">
      <div class="fc-card"><div class="fc-name">C1 Challenge</div><div class="fc-score ${tMTQ(c1,40)}">${c1}</div><div class="fc-max">/ 40</div></div>
      <div class="fc-card"><div class="fc-name">C2 Control</div><div class="fc-score ${tMTQ(c2,80)}">${c2}</div><div class="fc-max">/ 80</div></div>
      <div class="fc-card"><div class="fc-name">C3 Confidence</div><div class="fc-score ${tMTQ(c3,80)}">${c3}</div><div class="fc-max">/ 80</div></div>
      <div class="fc-card"><div class="fc-name">C4 Commitment</div><div class="fc-score ${tMTQ(c4,40)}">${c4}</div><div class="fc-max">/ 40</div></div>
    </div>
    <div class="section-label">Sub-dimension breakdown</div>
    ${DIMS.map(d=>{const s=ds[d.id];const t=tMTQ(s.sum,40);const pct=Math.round((s.sum/40)*100);const rn=d.items.filter(i=>i.rev).length;return`<div class="dim-block"><div class="dim-top"><span class="dim-name">${d.id} — ${d.c}</span><span class="dim-score-badge ${t}">${s.sum} / 40 · ${t==="h"?"High toughness":t==="m"?"Development zone":"Priority support"}</span></div><div class="bar-labels"><span>8</span><span>16</span><span>24</span><span>32</span><span>40</span></div><div class="bar-outer"><div class="bar-inner ${t}" style="width:${pct}%"></div></div><div class="dim-answered">${s.count} of 8 items · ${rn} reverse-scored items applied · Development zone < 24 · Strong ≥ 32</div><div class="dim-interp ${t}">${DIM_INTERP[d.id][t]}</div></div>`;}).join("")}
    <div class="rec-card"><div class="rec-title">Evaluator recommendations</div><div class="rec-text">${(()=>{const w=DIMS.filter(d=>tMTQ(ds[d.id].sum,40)==="l").map(d=>d.c),st=DIMS.filter(d=>tMTQ(ds[d.id].sum,40)==="h").map(d=>d.c);let r="";if(st.length)r+=`<strong>High toughness dimensions:</strong> ${st.join(", ")}. `;if(w.length)r+=`<strong>Priority development:</strong> ${w.join(", ")}. Coordinate with the PATHWAY mental skills specialist. `;r+=`<strong>Commitment (C4)</strong> is most directly linked to elite longevity. At 15–16, all 4C dimensions remain malleable. No score justifies exclusion.`;return r;})()}</div></div>
    <div class="disclaimer"><strong>Reverse scoring applied:</strong> scoreItem = rev ? (6 − raw) : raw. Commitment (C4) is most directly linked to long-term elite persistence. Confidential — MAS Foundation / Qatar Foundation internal use only.</div>`;
  }

  else if(a.tool==="PSYJ"){
    const{s,global}=calcPSYJ(a);
    const PSYJ_INTERP={ENG:{h:"High engagement — initiates independently, seeks additional challenge.",m:"Moderate engagement — participates willingly but needs some encouragement.",l:"Low engagement — stops when challenged. Needs motivational approach."},COM:{h:"Highly energised by competition — brings out best performance.",m:"Neutral to mild competitive response.",l:"Competition withdrawal or avoidance signals."},ERR:{h:"Error as information — immediately seeks to correct, self-directed.",m:"Retries with or without encouragement.",l:"Error avoidance — gives up or shows distress."},COA:{h:"Active coaching receptivity — applies immediately, seeks detail.",m:"Applies with some delay or partial compliance.",l:"Low receptivity — ignores or struggles to apply corrections."},ENJ:{h:"Exceptional enjoyment — joy is the dominant signal.",m:"Clear enjoyment signals — participates willingly.",l:"No or minimal enjoyment signals visible."}};
    body=`<div class="rep-title">MAS-PSY-J · Evaluator Observation Report</div>
    <div class="rep-subtitle">Evaluator observation grid · 5 dimensions · Age 8–12 · Completed by evaluator — NOT self-report</div>
    ${infoGrid}
    <div class="global-score-card PSYJ">
      <div class="gs-left"><div class="gs-label">PSY-J Global (evaluator)</div><div class="gs-value">${(global+1).toFixed(2)}<span class="gs-of"> / 5.00</span></div><div class="gs-sub">${Object.keys(s).length} of 5 dimensions scored</div></div>
      <div class="gs-right"><div class="gs-interp">${global>=3?"Highly favourable behavioural profile across all observed dimensions.":global>=1?"Developing profile — encourage across flagged dimensions.":"Priority — low engagement and enjoyment signals across multiple dimensions."}</div></div>
    </div>
    <div class="section-label">Observation dimensions</div>
    ${PSYJ_DIMS.map(d=>{const sc=s[d.id];const t=tPSYJ(sc);const pct=sc!==undefined?Math.round((sc/4)*100):0;return`<div class="dim-block"><div class="dim-top"><span class="dim-name">${d.id} — ${d.name}</span><span class="dim-score-badge ${t}">${sc!==undefined?(sc+1)+" / 5":"Not scored"} · ${t==="h"?"Favourable":t==="m"?"Standard":"Priority"}</span></div><div class="bar-labels"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div><div class="bar-outer"><div class="bar-inner ${t}" style="width:${pct}%"></div></div><div class="dim-interp ${t}">${PSYJ_INTERP[d.id]?.[t]||""}</div>${a.psyjNotes?.[d.id]?`<div style="font-size:10px;color:var(--muted);margin-top:6px;font-style:italic">Note: ${a.psyjNotes[d.id]}</div>`:""}</div>`;}).join("")}
    <div class="disclaimer">This is an evaluator observation report — not self-reported data. Scores reflect observed behaviour during the session only. No score justifies exclusion before age 14. Confidential — MAS Foundation internal use only.</div>`;
  }

  const notes=a.notes?`<div class="rec-card"><div class="rec-title">Session notes</div><div class="rec-text">${a.notes}</div></div>`:"";
  document.getElementById("rep-content").innerHTML=`<div class="rep-wrapper" id="printable">${masthead}${body}${notes}${actions}</div>`;
}

// INIT
load();
document.getElementById("f-date").value=new Date().toISOString().slice(0,10);
renderList();
</script>
</body>
</html>
